<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="The Admin Panel">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="admin_lebontaxi_web_panel">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>admin_lebontaxi_web_panel</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #060B18;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading-indicator {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #ffffff;
      background-color: #060B18;
    }
    .spinner-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
    }
    .spinner-glow {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(251, 191, 36, 0.2) 0%, rgba(251, 191, 36, 0) 70%);
      animation: pulse 2s ease-in-out infinite;
    }
    .spinner {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      border: 4px solid rgba(255, 255, 255, 0.05);
      border-top: 4px solid #FBBF24;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.5, 0.1, 0.4, 0.9) infinite;
    }
    .loading-text {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #FBBF24;
      text-transform: uppercase;
      animation: fade 1.5s ease-in-out infinite alternate;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(0.95); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 1; }
    }
    @keyframes fade {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="spinner-container">
      <div class="spinner-glow"></div>
      <div class="spinner"></div>
    </div>
    <div class="loading-text">Le Bon Taxi</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
