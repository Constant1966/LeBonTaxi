<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="The Admin Panel">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="admin_lebontaxi_web_panel">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>admin_lebontaxi_web_panel</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #060B18;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #loading-indicator {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background: linear-gradient(135deg, #060B18 0%, #0A0F20 50%, #15102A 100%);
      overflow: hidden;
    }
    /* Grid background overlay */
    #loading-indicator::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 1;
      pointer-events: none;
    }
    /* Glowing background orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      z-index: 0;
      animation: pulse-orb 8s ease-in-out infinite alternate;
    }
    .orb-1 {
      top: 15%;
      left: 10%;
      width: 260px;
      height: 260px;
      background: #FBBF24;
      animation-delay: 0s;
    }
    .orb-2 {
      bottom: 10%;
      right: 12%;
      width: 320px;
      height: 320px;
      background: #6366F1;
      animation-delay: -2s;
    }
    .orb-3 {
      top: 35%;
      left: 35%;
      width: 300px;
      height: 300px;
      background: #FBBF24;
      opacity: 0.08;
      animation-delay: -4s;
    }
    @keyframes pulse-orb {
      0% { transform: scale(1) translate(0, 0); opacity: 0.10; }
      100% { transform: scale(1.15) translate(20px, 15px); opacity: 0.18; }
    }

    .content-container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Logo structure */
    .logo-container {
      position: relative;
      width: 180px;
      height: 180px;
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .logo-glow {
      position: absolute;
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(251, 191, 36, 0.25) 0%, rgba(251, 191, 36, 0.05) 50%, rgba(251, 191, 36, 0) 100%);
      animation: pulse-glow 2s ease-in-out infinite alternate;
    }
    .logo-frame {
      box-sizing: border-box;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.05) 100%);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 40px rgba(251, 191, 36, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.05);
      overflow: hidden;
    }
    .logo-image {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
    }
    @keyframes pulse-glow {
      0% { transform: scale(0.95); opacity: 0.5; }
      100% { transform: scale(1.08); opacity: 1; }
    }

    /* Brand typography */
    .brand-title {
      font-size: 44px;
      font-weight: 800;
      color: #ffffff;
      margin: 0 0 10px 0;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 0%, #FBBF24 50%, #ffffff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand-subtitle {
      font-size: 13px;
      font-weight: 700;
      color: rgba(251, 191, 36, 0.9);
      letter-spacing: 6px;
      padding: 6px 16px;
      border-radius: 100px;
      border: 1px solid rgba(251, 191, 36, 0.25);
      background-color: rgba(251, 191, 36, 0.06);
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    /* Elegant indeterminate progress bar */
    .progress-bar-container {
      width: 200px;
      height: 4px;
      background-color: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
      position: relative;
    }
    .progress-bar-fill {
      width: 60px;
      height: 100%;
      background: linear-gradient(90deg, #FBBF24, #F59E0B, #FBBF24);
      border-radius: 2px;
      position: absolute;
      left: -60px;
      animation: loading-bar 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      box-shadow: 0 0 8px rgba(251, 191, 36, 0.5);
    }
    @keyframes loading-bar {
      0% { left: -60px; }
      100% { left: 200px; }
    }

    /* Loading text */
    .loading-text {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.5px;
      animation: fade-text 1.5s ease-in-out infinite alternate;
    }
    @keyframes fade-text {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <!-- Animated background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="content-container">
      <!-- Logo frame -->
      <div class="logo-container">
        <div class="logo-glow"></div>
        <div class="logo-frame">
          <img class="logo-image" src="assets/images/lebontaxi.png" alt="Le Bon Taxi" />
        </div>
      </div>
      
      <!-- App Name & Subtitle -->
      <h1 class="brand-title">Le Bon Taxi</h1>
      <div class="brand-subtitle">ADMIN PANEL</div>
      
      <!-- Progress Indicator -->
      <div class="progress-bar-container">
        <div class="progress-bar-fill"></div>
      </div>
      
      <!-- Status text -->
      <div class="loading-text">Chargement de votre espace...</div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
